<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E6B Flight Computer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/preact@10/dist/preact.umd.js"></script>
    <script src="https://unpkg.com/preact@10/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; overflow-x:hidden; }
        @media (min-width:1024px) { body { zoom:0.9; } }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { opacity:1; }
        .fade-in { animation:fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .scrollbar-hide::-webkit-scrollbar { display:none; }
        .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
        .result-box { background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); }
        @keyframes spin { to { transform:rotate(360deg) } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;">
        <div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="font-size:13px;color:#64748b;font-weight:700;">E6B Loading...</p>
    </div>
</div>
<script>
const { h, render, Component } = preact;
const { useState, useMemo, useEffect, useRef } = preactHooks;
const html = htm.bind(h);

// ── Math helpers ──────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const norm360 = d => ((d % 360) + 360) % 360;
const fmtHdr = v => String(Math.round(norm360(v))).padStart(3,'0') + '°';

// ── Shared UI ─────────────────────────────────────────────────────
function NumInput({ label, value, onChange, unit, min, max, step=1, note }) {
    return html`
    <div class="flex flex-col gap-0.5">
        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${label}</label>
        <div class="relative flex items-center">
            <input type="number" value=${value}
                onInput=${e => onChange(parseFloat(e.target.value) || 0)}
                min=${min} max=${max} step=${step}
                class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all pr-10" />
            ${unit && html`<span class="absolute right-3 text-[10px] text-slate-400 font-bold pointer-events-none">${unit}</span>`}
        </div>
        ${note && html`<span class="text-[9px] text-slate-400">${note}</span>`}
    </div>`;
}

function ResultCard({ label, value, unit, sub, highlight }) {
    return html`
    <div class=${'result-box rounded-xl p-3 flex flex-col gap-0.5' + (highlight ? ' ring-2 ring-blue-500' : '')}>
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${label}</span>
        <div class="flex items-baseline gap-1.5">
            <span class="text-2xl font-black text-white leading-none">${value}</span>
            ${unit && html`<span class="text-[10px] text-slate-400 font-bold">${unit}</span>`}
        </div>
        ${sub && html`<span class="text-[10px] text-slate-400">${sub}</span>`}
    </div>`;
}

function SectionHeader({ icon, title, badge }) {
    return html`
    <div class="px-4 py-3 bg-slate-50 border-b flex items-center gap-2">
        <span class="text-blue-600 text-base">${ICONS[icon] || ''}</span>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-tighter">${title}</h2>
        ${badge && html`<span class="ml-auto text-[9px] bg-blue-100 text-blue-700 font-black px-2 py-0.5 rounded-full uppercase tracking-wider">${badge}</span>`}
    </div>`;
}

// Simple icon map (text/emoji fallback instead of Lucide)
const ICONS = {
    plane:'✈', wind:'🌬', timer:'⏱', fuel:'⛽', mountain:'⛰', repeat:'🔄',
    'map-pin':'📍', navigation:'🧭', compass:'🧭', calculator:'🧮', weight:'⚖',
    gauge:'📊', table:'📋', activity:'📈', thermometer:'🌡', ruler:'📏',
    'arrow-up':'↑', droplets:'💧', helicopter:'🚁'
};

// ══════════════════════════════════════════════════════════════════
// 1. WIND TRIANGLE
// ══════════════════════════════════════════════════════════════════
function WindCalc() {
    const [tc, setTc] = useState(90);
    const [tas, setTas] = useState(100);
    const [windFrom, setWindFrom] = useState(270);
    const [windSpeed, setWindSpeed] = useState(20);
    const [variation, setVariation] = useState(-8);

    const calc = useMemo(() => {
        if (tas <= 0) return null;
        const WA = toRad(windFrom - tc);
        const ratio = windSpeed / tas;
        if (Math.abs(ratio * Math.sin(WA)) > 1) return null;
        const WCA_rad = Math.asin(ratio * Math.sin(WA));
        const WCA = WCA_rad * 180 / Math.PI;
        const TH = norm360(tc + WCA);
        const GS = tas * Math.cos(WCA_rad) - windSpeed * Math.cos(WA);
        if (GS <= 0) return null;
        const MH = norm360(TH - variation);
        return { WCA: Math.abs(WCA).toFixed(1), WCAdir: WCA >= 0 ? 'R' : 'L', TH: fmtHdr(TH), GS: GS.toFixed(0), MH: fmtHdr(MH), THraw: TH };
    }, [tc, tas, windFrom, windSpeed, variation]);

    const windDeg = norm360(windFrom + 180);
    const sin = Math.sin, cos = Math.cos, r = toRad;

    return html`
    <div class="fade-in space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <${SectionHeader} icon="navigation" title="입력값" />
                <div class="p-4 grid grid-cols-2 gap-3">
                    <${NumInput} label="진침로 TC" value=${tc} onChange=${setTc} unit="°" min=0 max=359 note="0-359°" />
                    <${NumInput} label="TAS" value=${tas} onChange=${setTas} unit="kt" min=1 max=999 />
                    <${NumInput} label="풍향 (From)" value=${windFrom} onChange=${setWindFrom} unit="°" min=0 max=359 />
                    <${NumInput} label="풍속" value=${windSpeed} onChange=${setWindSpeed} unit="kt" min=0 max=200 />
                    <div class="col-span-2">
                        <${NumInput} label="편차 Variation" value=${variation} onChange=${setVariation} unit="°" step=0.5 note="동편차(+), 서편차(-)" />
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <${SectionHeader} icon="compass" title="바람 삼각형" />
                    <div class="p-4 flex justify-center items-center gap-4">
                        <svg width="140" height="140" viewBox="0 0 160 160" style="max-width:140px;width:100%">
                            <circle cx="80" cy="80" r="72" fill="#0f172a" stroke="#334155" stroke-width="1"/>
                            <circle cx="80" cy="80" r="60" fill="none" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="2,4"/>
                            ${['N','E','S','W'].map((d,i) => html`
                                <text key=${d} x=${80+52*sin(i*90*Math.PI/180)} y=${80-52*cos(i*90*Math.PI/180)+4}
                                    text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">${d}</text>`)}
                            <line x1="80" y1="80" x2=${80+48*sin(r(tc))} y2=${80-48*cos(r(tc))} stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
                            <polygon points="0,-5 3,3 -3,3" fill="#22c55e" transform=${'translate('+( 80+48*sin(r(tc)))+','+(80-48*cos(r(tc)))+') rotate('+tc+')'}/>
                            ${calc && html`
                                <line x1="80" y1="80" x2=${80+48*sin(r(calc.THraw))} y2=${80-48*cos(r(calc.THraw))} stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,2"/>
                                <polygon points="0,-5 3,3 -3,3" fill="#60a5fa" transform=${'translate('+(80+48*sin(r(calc.THraw)))+','+(80-48*cos(r(calc.THraw)))+') rotate('+calc.THraw+')'}/>
                            `}
                            <line x1=${80-36*sin(r(windDeg))} y1=${80+36*cos(r(windDeg))} x2=${80+36*sin(r(windDeg))} y2=${80-36*cos(r(windDeg))} stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
                            <polygon points="0,-5 3,3 -3,3" fill="#fbbf24" transform=${'translate('+(80+36*sin(r(windDeg)))+','+(80-36*cos(r(windDeg)))+') rotate('+windDeg+')'}/>
                            <circle cx="80" cy="80" r="3" fill="#f1f5f9"/>
                        </svg>
                        <div class="flex flex-col gap-2 text-[10px]">
                            <div class="flex items-center gap-1.5"><div class="w-5 h-0.5 bg-green-500 rounded"></div><span class="text-slate-500">진침로(TC)</span></div>
                            <div class="flex items-center gap-1.5"><div class="w-5 h-0 border-t-2 border-dashed border-blue-400"></div><span class="text-slate-500">진항로(TH)</span></div>
                            <div class="flex items-center gap-1.5"><div class="w-5 h-0.5 bg-yellow-400 rounded"></div><span class="text-slate-500">바람</span></div>
                        </div>
                    </div>
                </div>
                ${calc ? html`
                    <div class="grid grid-cols-2 gap-2">
                        <${ResultCard} label="편류수정각 WCA" value=${''+calc.WCA+'°'+calc.WCAdir} sub="R=우, L=좌" />
                        <${ResultCard} label="진항로 TH" value=${calc.TH} highlight=${true} />
                        <${ResultCard} label="자기항로 MH" value=${calc.MH} highlight=${true} />
                        <${ResultCard} label="지상속도 GS" value=${calc.GS} unit="kt" />
                    </div>
                ` : html`<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-600 font-bold">계산 불가: 풍속이 TAS보다 크거나 입력값을 확인하세요.</div>`}
            </div>
        </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// 2. TSD
// ══════════════════════════════════════════════════════════════════
function TSDCalc() {
    const [mode, setMode] = useState('time');
    const [timeH, setTimeH] = useState(1);
    const [timeM, setTimeM] = useState(30);
    const [timeS, setTimeS] = useState(0);
    const [speed, setSpeed] = useState(120);
    const [dist, setDist] = useState(180);

    const pad = n => String(Math.max(0, Math.floor(n))).padStart(2,'0');

    const result = useMemo(() => {
        const T = timeH*3600 + timeM*60 + timeS;
        const p = n => String(Math.max(0, Math.floor(n))).padStart(2,'0');
        if (mode === 'time') {
            if (speed <= 0) return null;
            const sec = (dist/speed)*3600;
            const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=Math.round(sec%60);
            return { time: p(h)+':'+p(m)+':'+p(s), speed: speed.toFixed(1), dist: dist.toFixed(1) };
        }
        if (mode === 'speed') {
            if (T <= 0) return null;
            const spd = dist/(T/3600);
            return { time: p(timeH)+':'+p(timeM)+':'+p(timeS), speed: spd.toFixed(1), dist: dist.toFixed(1) };
        }
        const d = speed*(T/3600);
        return { time: p(timeH)+':'+p(timeM)+':'+p(timeS), speed: speed.toFixed(1), dist: d.toFixed(1) };
    }, [mode, timeH, timeM, timeS, speed, dist]);

    const ModeBtn = ({ val, label }) => html`
        <button onClick=${() => setMode(val)}
            class=${'flex-1 py-2 text-xs font-black rounded-lg transition-all ' + (mode===val ? 'bg-blue-600 text-white shadow' : 'bg-slate-100 text-slate-500')}>
            ${label} 구하기
        </button>`;

    const disabled = k => mode === k;

    return html`
    <div class="fade-in">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <${SectionHeader} icon="timer" title="시간 · 속도 · 거리" badge="TSD" />
            <div class="p-4 space-y-4">
                <div class="flex gap-2">
                    <${ModeBtn} val="time" label="시간" />
                    <${ModeBtn} val="speed" label="속도" />
                    <${ModeBtn} val="dist" label="거리" />
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class=${'rounded-xl border p-3 space-y-2 ' + (mode==='time' ? 'border-blue-300 bg-blue-50' : 'border-slate-200')}>
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">시간 HH:MM:SS</label>
                        <div class="flex gap-1 items-center">
                            <input type="number" value=${timeH} onInput=${e=>setTimeH(parseInt(e.target.value)||0)} min=0 disabled=${disabled('time')}
                                class="w-14 bg-white border border-slate-200 rounded px-1 py-1.5 text-sm font-bold text-center outline-none focus:ring-1 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-300"/>
                            <span class="text-slate-300 font-bold">:</span>
                            <input type="number" value=${timeM} onInput=${e=>setTimeM(Math.min(59,parseInt(e.target.value)||0))} min=0 max=59 disabled=${disabled('time')}
                                class="w-14 bg-white border border-slate-200 rounded px-1 py-1.5 text-sm font-bold text-center outline-none focus:ring-1 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-300"/>
                            <span class="text-slate-300 font-bold">:</span>
                            <input type="number" value=${timeS} onInput=${e=>setTimeS(Math.min(59,parseInt(e.target.value)||0))} min=0 max=59 disabled=${disabled('time')}
                                class="w-14 bg-white border border-slate-200 rounded px-1 py-1.5 text-sm font-bold text-center outline-none focus:ring-1 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-300"/>
                        </div>
                        ${mode==='time' && result && html`<div class="result-box rounded-lg px-3 py-2"><span class="text-lg font-black text-white">${result.time}</span></div>`}
                    </div>
                    <div class=${'rounded-xl border p-3 space-y-2 ' + (mode==='speed' ? 'border-blue-300 bg-blue-50' : 'border-slate-200')}>
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">속도 (kt)</label>
                        <input type="number" value=${speed} onInput=${e=>setSpeed(parseFloat(e.target.value)||0)} min=1 disabled=${disabled('speed')}
                            class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-1 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-300"/>
                        ${mode==='speed' && result && html`<div class="result-box rounded-lg px-3 py-2 flex items-baseline gap-1"><span class="text-lg font-black text-white">${result.speed}</span><span class="text-[10px] text-slate-400">kt</span></div>`}
                    </div>
                    <div class=${'rounded-xl border p-3 space-y-2 ' + (mode==='dist' ? 'border-blue-300 bg-blue-50' : 'border-slate-200')}>
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">거리 (NM)</label>
                        <input type="number" value=${dist} onInput=${e=>setDist(parseFloat(e.target.value)||0)} min=0 disabled=${disabled('dist')}
                            class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-1 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-300"/>
                        ${mode==='dist' && result && html`<div class="result-box rounded-lg px-3 py-2 flex items-baseline gap-1"><span class="text-lg font-black text-white">${result.dist}</span><span class="text-[10px] text-slate-400">NM</span></div>`}
                    </div>
                </div>
                ${result && html`
                    <div class="result-box rounded-xl p-4 grid grid-cols-3 gap-3 text-center">
                        <div><div class="text-[9px] text-slate-400 font-black uppercase mb-1">비행시간</div><div class="text-base font-black text-white">${result.time}</div></div>
                        <div><div class="text-[9px] text-slate-400 font-black uppercase mb-1">속도</div><div class="text-base font-black text-white">${result.speed} <span class="text-xs text-slate-400">kt</span></div></div>
                        <div><div class="text-[9px] text-slate-400 font-black uppercase mb-1">거리</div><div class="text-base font-black text-white">${result.dist} <span class="text-xs text-slate-400">NM</span></div></div>
                    </div>`}
            </div>
        </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// 3. FUEL
// ══════════════════════════════════════════════════════════════════
function FuelCalc() {
    const [fob, setFob] = useState(800);
    const [ff, setFf] = useState(200);
    const [gs, setGs] = useState(120);
    const [reserve, setReserve] = useState(20);
    const [unit, setUnit] = useState('kg');

    const KL = 0.803, KG = 3.040, KLB = 2.20462;
    const toKg = v => unit==='kg' ? v : unit==='L' ? v*KL : unit==='USG' ? v*KG : v/KLB;
    const frKg = v => unit==='kg' ? v : unit==='L' ? v/KL : unit==='USG' ? v/KG : v*KLB;

    const fobK=toKg(fob), ffK=toKg(ff);
    const resK=ffK*(reserve/60);
    const usable=Math.max(0,fobK-resK);
    const endAll=ffK>0?fobK/ffK:0, endUse=ffK>0?usable/ffK:0;
    const rngAll=endAll*gs, rngUse=endUse*gs;

    const fmtT = h => { const hh=Math.floor(h),mm=Math.round((h-hh)*60); return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); };

    const UBtn = ({ u }) => html`<button onClick=${() => {
        const k=toKg(fob), kf=toKg(ff); setUnit(u);
        setFob(parseFloat((u==='kg'?k:u==='L'?k/KL:u==='USG'?k/KG:k*KLB).toFixed(1)));
        setFf(parseFloat((u==='kg'?kf:u==='L'?kf/KL:u==='USG'?kf/KG:kf*KLB).toFixed(1)));
    }} class=${'px-3 py-1 text-xs font-black rounded-lg ' + (unit===u?'bg-blue-600 text-white':'bg-slate-100 text-slate-500')}>${u}</button>`;

    const [dist2, setDist2] = useState(100);
    const tripT = gs>0 ? dist2/gs : 0;
    const tripF = ffK*tripT;

    return html`
    <div class="fade-in space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <${SectionHeader} icon="fuel" title="연료 계획" badge="Fuel" />
                <div class="p-4 space-y-3">
                    <div class="flex gap-1.5 items-center flex-wrap">
                        <${UBtn} u="kg" /><${UBtn} u="lbs" /><${UBtn} u="L" /><${UBtn} u="USG" />
                        <span class="ml-auto text-[9px] text-slate-400">Jet-A: 0.803 kg/L · 1 kg=2.205 lbs</span>
                    </div>
                    <${NumInput} label=${'탑재 연료 FOB'} value=${fob} onChange=${setFob} unit=${unit} min=0 step=${unit==='kg'?10:unit==='L'?12.5:unit==='USG'?3:22} />
                    <${NumInput} label=${'연료소모율 FF'} value=${ff} onChange=${setFf} unit=${unit+'/hr'} min=0.1 step=${unit==='kg'?5:unit==='L'?6.2:unit==='USG'?1.5:11} />
                    <${NumInput} label="지상속도 GS" value=${gs} onChange=${setGs} unit="kt" min=1 />
                    <${NumInput} label="예비 연료" value=${reserve} onChange=${setReserve} unit="min" min=0 max=120 />
                </div>
            </div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <${ResultCard} label="비행가능시간(전체)" value=${fmtT(endAll)} sub="HH:MM" />
                    <${ResultCard} label="실사용 비행시간" value=${fmtT(endUse)} highlight=${true} sub=${'예비 '+reserve+'분 공제'} />
                    <${ResultCard} label="항속거리(전체)" value=${rngAll.toFixed(0)} unit="NM" />
                    <${ResultCard} label="실사용 항속거리" value=${rngUse.toFixed(0)} unit="NM" highlight=${true} />
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <${SectionHeader} icon="calculator" title="구간 연료 계산" />
                    <div class="p-4 space-y-3">
                        <${NumInput} label="목적지까지 거리" value=${dist2} onChange=${setDist2} unit="NM" min=0 />
                        <div class="result-box rounded-xl p-3 grid grid-cols-2 gap-3">
                            <div><div class="text-[9px] text-slate-400 font-black uppercase mb-1">구간 비행시간</div><div class="text-lg font-black text-white">${fmtT(tripT)}</div></div>
                            <div><div class="text-[9px] text-slate-400 font-black uppercase mb-1">필요 연료</div><div class="text-lg font-black text-white">${frKg(tripF).toFixed(1)} <span class="text-xs text-slate-400">${unit}</span></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// 4. DENSITY ALTITUDE
// ══════════════════════════════════════════════════════════════════
function DensityAlt() {
    const [pa, setPa] = useState(2000);
    const [oat, setOat] = useState(25);
    const [ias, setIas] = useState(100);
    const [qnh, setQnh] = useState(1013.25);
    const [altInd, setAltInd] = useState(2000);
    const [useQnh, setUseQnh] = useState(false);

    const compPA = useQnh ? Math.round(altInd + (1013.25 - qnh)*30) : pa;

    const calc = useMemo(() => {
        const T_std_C = 15 - compPA/500;
        const T_std_K = T_std_C + 273.15;
        const T_act_K = oat + 273.15;
        const ISA_dev = oat - T_std_C;
        const P_ratio = Math.pow(T_std_K/288.15, 5.2561);
        const sigma = P_ratio * (288.15/T_act_K);
        const DA = Math.round(145442*(1 - Math.pow(sigma, 0.235)));
        const TAS = ias / Math.sqrt(sigma);
        const a = Math.sqrt(1.4*287.05*T_act_K);
        const mach = (TAS*0.514444)/a;
        return { ISA_dev: ISA_dev.toFixed(1), T_std: T_std_C.toFixed(1), DA, TAS: TAS.toFixed(1), mach: mach.toFixed(3) };
    }, [compPA, oat, ias]);

    const isaRows = [0,1000,2000,3000,4000,5000,6000,8000,10000,15000];

    return html`
    <div class="fade-in space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <${SectionHeader} icon="mountain" title="밀도 고도" badge="DA" />
                <div class="p-4 space-y-3">
                    <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-3">
                        <span class="text-xs font-black text-slate-500">PA 입력:</span>
                        <button onClick=${()=>setUseQnh(false)} class=${'px-3 py-1 text-xs font-black rounded ' + (!useQnh?'bg-blue-600 text-white':'bg-white text-slate-500')}>직접</button>
                        <button onClick=${()=>setUseQnh(true)}  class=${'px-3 py-1 text-xs font-black rounded ' + (useQnh?'bg-blue-600 text-white':'bg-white text-slate-500')}>QNH→PA</button>
                    </div>
                    ${useQnh ? html`
                        <${NumInput} label="지시 고도" value=${altInd} onChange=${setAltInd} unit="ft" min=-1500 max=60000 step=100 />
                        <${NumInput} label="QNH" value=${qnh} onChange=${setQnh} unit="hPa" min=900 max=1100 step=0.25 />
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-600 font-black">계산된 PA: ${compPA.toLocaleString()} ft</div>
                    ` : html`<${NumInput} label="압력 고도 PA" value=${pa} onChange=${setPa} unit="ft" min=-1500 max=60000 step=100 />`}
                    <${NumInput} label="외기온도 OAT" value=${oat} onChange=${setOat} unit="°C" min=-80 max=60 />
                    <div class="border-t border-slate-100 pt-3">
                        <${NumInput} label="IAS (TAS 계산용)" value=${ias} onChange=${setIas} unit="kt" min=1 max=600 />
                    </div>
                </div>
            </div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <${ResultCard} label="밀도 고도 DA" value=${calc.DA.toLocaleString()} unit="ft" highlight=${true} />
                    <${ResultCard} label="ISA 편차" value=${(parseFloat(calc.ISA_dev)>=0?'+':'')+calc.ISA_dev} unit="°C" sub=${'ISA 표준: '+calc.T_std+'°C'} />
                    <${ResultCard} label="진대기속도 TAS" value=${calc.TAS} unit="kt" highlight=${true} />
                    <${ResultCard} label="마하수 Mach" value=${calc.mach} />
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <${SectionHeader} icon="table" title="ISA 표준 대기" />
                    <div class="overflow-x-auto">
                        <table class="w-full text-[10px]">
                            <thead class="bg-slate-50"><tr class="border-b border-slate-100">
                                <th class="px-3 py-2 text-left font-black text-slate-400 uppercase">고도 ft</th>
                                <th class="px-3 py-2 text-right font-black text-slate-400 uppercase">ISA °C</th>
                                <th class="px-3 py-2 text-right font-black text-slate-400 uppercase">P hPa</th>
                            </tr></thead>
                            <tbody>
                                ${isaRows.map(alt => {
                                    const T=15-alt/500;
                                    const P=1013.25*Math.pow((288.15-alt*0.0019812)/288.15,5.2561);
                                    const hi=Math.abs(compPA-alt)<600;
                                    return html`<tr key=${alt} class=${'border-b border-slate-50 '+(hi?'bg-blue-50':'')}>
                                        <td class="px-3 py-1.5 font-bold text-slate-700">${alt.toLocaleString()}</td>
                                        <td class="px-3 py-1.5 text-right font-mono text-slate-600">${T.toFixed(1)}</td>
                                        <td class="px-3 py-1.5 text-right font-mono text-slate-600">${P.toFixed(1)}</td>
                                    </tr>`;
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>`;
}

const UCATS = [
    { id:'dist', label:'거리', units:[
        {id:'nm',label:'NM',toB:v=>v,frB:v=>v},{id:'km',label:'km',toB:v=>v/1.852,frB:v=>v*1.852},
        {id:'sm',label:'SM',toB:v=>v/1.15078,frB:v=>v*1.15078},{id:'ft',label:'ft',toB:v=>v/6076.12,frB:v=>v*6076.12},
        {id:'m',label:'m',toB:v=>v/1852,frB:v=>v*1852}]},
    { id:'speed', label:'속도', units:[
        {id:'kt',label:'kt',toB:v=>v,frB:v=>v},{id:'kmh',label:'km/h',toB:v=>v/1.852,frB:v=>v*1.852},
        {id:'mph',label:'mph',toB:v=>v/1.15078,frB:v=>v*1.15078},{id:'ms',label:'m/s',toB:v=>v/0.514444,frB:v=>v*0.514444},
        {id:'fpm',label:'fpm',toB:v=>v/101.269,frB:v=>v*101.269}]},
    { id:'alt', label:'고도', units:[
        {id:'ft',label:'ft',toB:v=>v,frB:v=>v},{id:'m',label:'m',toB:v=>v/0.3048,frB:v=>v*0.3048}]},
    { id:'temp', label:'온도', units:[
        {id:'c',label:'°C',toB:v=>v,frB:v=>v},{id:'f',label:'°F',toB:v=>(v-32)*5/9,frB:v=>v*9/5+32},
        {id:'k',label:'K',toB:v=>v-273.15,frB:v=>v+273.15}]},
    { id:'weight', label:'중량', units:[
        {id:'kg',label:'kg',toB:v=>v,frB:v=>v},{id:'lbs',label:'lbs',toB:v=>v/2.20462,frB:v=>v*2.20462}]},
    { id:'press', label:'기압', units:[
        {id:'hpa',label:'hPa',toB:v=>v,frB:v=>v},{id:'inhg',label:'inHg',toB:v=>v/0.02953,frB:v=>v*0.02953},
        {id:'psi',label:'psi',toB:v=>v/0.014504,frB:v=>v*0.014504}]},
    { id:'vol', label:'용량', units:[
        {id:'L',label:'L',toB:v=>v,frB:v=>v},{id:'USG',label:'USG',toB:v=>v/0.264172,frB:v=>v*0.264172},
        {id:'kg',label:'kg(JetA)',toB:v=>v/0.803,frB:v=>v*0.803}]},
];

function UnitConv() {
    const [cat, setCat] = useState('dist');
    const [srcId, setSrcId] = useState(null);
    const [val, setVal] = useState(100);

    const category = UCATS.find(c=>c.id===cat);
    const src = category.units.find(u=>u.id===srcId) || category.units[0];
    const base = src.toB(val);

    return html`
    <div class="fade-in">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <${SectionHeader} icon="repeat" title="단위 환산" />
            <div class="p-4 space-y-4">
                <div class="flex flex-wrap gap-1.5">
                    ${UCATS.map(c => html`<button key=${c.id} onClick=${()=>{setCat(c.id);setSrcId(null);setVal(1);}}
                        class=${'px-3 py-1.5 text-xs font-black rounded-lg ' + (cat===c.id?'bg-blue-600 text-white':'bg-slate-100 text-slate-500')}>${c.label}</button>`)}
                </div>
                <div class="flex flex-wrap gap-1.5">
                    <span class="text-[9px] text-slate-400 font-black self-center w-full">입력 단위:</span>
                    ${category.units.map(u => html`<button key=${u.id} onClick=${()=>setSrcId(u.id)}
                        class=${'px-3 py-1.5 text-xs font-black rounded-lg ' + (src.id===u.id?'bg-slate-800 text-white':'bg-slate-100 text-slate-500')}>${u.label}</button>`)}
                </div>
                <div class="relative">
                    <input type="number" value=${val} onInput=${e=>setVal(parseFloat(e.target.value)||0)}
                        class="w-full bg-white border-2 border-blue-200 rounded-xl px-4 py-3 text-xl font-black focus:ring-2 focus:ring-blue-500 outline-none pr-20"/>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-black">${src.label}</span>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    ${category.units.filter(u=>u.id!==src.id).map(u => {
                        const cv = u.frB(base);
                        const disp = Math.abs(cv)>=10000 ? cv.toExponential(3) : (parseFloat(cv.toFixed(5)).toString());
                        return html`<div key=${u.id} class="result-box rounded-xl p-3 flex justify-between items-center cursor-pointer"
                            onClick=${()=>{setSrcId(u.id);setVal(parseFloat(cv.toFixed(6)));}}>
                            <span class="text-[10px] text-slate-400 font-black">${u.label}</span>
                            <span class="text-lg font-black text-white">${disp}</span>
                        </div>`;
                    })}
                </div>
                <p class="text-[9px] text-slate-400 text-right">결과를 탭하면 해당 단위로 전환됩니다</p>
            </div>
        </div>
    </div>`;
}

// 6. COORDINATE CONVERSION
// ══════════════════════════════════════════════════════════════════
function CoordConv() {
    const [type, setType] = useState('DD');
    const [latDD, setLatDD] = useState(37.5635);
    const [lonDD, setLonDD] = useState(126.9778);
    const mapRef = useRef(null);
    const leafletMap = useRef(null);
    const markerRef = useRef(null);
    const [latD,setLatD]=useState(37); const [latM,setLatM]=useState(33); const [latS,setLatS]=useState(49); const [latDir,setLatDir]=useState('N');
    const [lonD,setLonD]=useState(126); const [lonM,setLonM]=useState(58); const [lonS,setLonS]=useState(40); const [lonDir,setLonDir]=useState('E');
    const [latDd,setLatDd]=useState(37); const [latDm,setLatDm]=useState(33.816); const [latDdir,setLatDdir]=useState('N');
    const [lonDd,setLonDd]=useState(126); const [lonDm,setLonDm]=useState(58.668); const [lonDdir,setLonDdir]=useState('E');

    const latDec = useMemo(() => {
        if (type==='DD') return latDD;
        const sign = (d) => (d==='S'||d==='W') ? -1 : 1;
        if (type==='DMS') return sign(latDir)*((latD||0)+(latM||0)/60+(latS||0)/3600);
        return sign(latDdir)*((latDd||0)+(latDm||0)/60);
    }, [type,latDD,latD,latM,latS,latDir,latDd,latDm,latDdir]);

    const lonDec = useMemo(() => {
        if (type==='DD') return lonDD;
        const sign = (d) => (d==='S'||d==='W') ? -1 : 1;
        if (type==='DMS') return sign(lonDir)*((lonD||0)+(lonM||0)/60+(lonS||0)/3600);
        return sign(lonDdir)*((lonDd||0)+(lonDm||0)/60);
    }, [type,lonDD,lonD,lonM,lonS,lonDir,lonDd,lonDm,lonDdir]);

    const dms = dd => {
        const a=Math.abs(dd), d=Math.floor(a), mAll=(a-d)*60, m=Math.floor(mAll), s=(mAll-m)*60;
        return {d,m,s};
    };
    const latDMS=dms(latDec), lonDMS=dms(lonDec);
    const ld=latDec>=0?'N':'S', lo=lonDec>=0?'E':'W';
    const valid=!isNaN(latDec)&&!isNaN(lonDec)&&Math.abs(latDec)<=90&&Math.abs(lonDec)<=180;

    useEffect(() => {
        if (!mapRef.current) return;
        leafletMap.current = L.map(mapRef.current).setView([37.5635, 126.9778], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 18
        }).addTo(leafletMap.current);
        markerRef.current = L.marker([37.5635, 126.9778]).addTo(leafletMap.current);
        return () => {
            if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; }
        };
    }, []);

    useEffect(() => {
        if (!valid || !leafletMap.current) return;
        leafletMap.current.setView([latDec, lonDec], leafletMap.current.getZoom());
        if (markerRef.current) markerRef.current.setLatLng([latDec, lonDec]);
    }, [latDec, lonDec, valid]);

    const DBtn = ({val,cur,set}) => html`<button onClick=${()=>set(val)}
        class=${'flex-1 py-2 text-xs font-black rounded ' + (cur===val?'bg-blue-600 text-white':'bg-slate-100 text-slate-500')}>${val}</button>`;

    const SI = ({value,onChange,max,step=1,lbl}) => html`
        <div class="flex flex-col gap-0.5 flex-1 min-w-0">
            ${lbl && html`<span class="text-[8px] text-slate-400 font-black text-center">${lbl}</span>`}
            <input type="number" value=${value} onInput=${e=>onChange(parseFloat(e.target.value)||0)} min=0 max=${max} step=${step}
                class="w-full bg-white border border-slate-200 rounded-lg px-1 py-2 text-sm font-bold text-center outline-none focus:ring-1 focus:ring-blue-500"/>
        </div>`;

    return html`
    <div class="fade-in">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <${SectionHeader} icon="map-pin" title="좌표 변환" badge="Coords" />
            <div class="p-4 space-y-4">
                <div class="flex gap-2">
                    ${['DD','DMS','DDM'].map(t => html`<button key=${t} onClick=${()=>setType(t)}
                        class=${'flex-1 py-2 text-xs font-black rounded-lg ' + (type===t?'bg-blue-600 text-white':'bg-slate-100 text-slate-500')}>
                        ${t==='DD'?'십진도':t==='DMS'?'도분초':'도분'}
                    </button>`)}
                </div>
                <div class="space-y-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">위도 (Latitude)</label>
                        ${type==='DD' && html`<div class="flex gap-2 items-center"><input type="number" value=${latDD} onInput=${e=>setLatDD(parseFloat(e.target.value)||0)} step=0.0001 min=-90 max=90 class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-1 focus:ring-blue-500"/><span class="text-xs text-slate-400">° (N+ S-)</span></div>`}
                        ${type==='DMS' && html`<div class="flex gap-1.5 items-end"><${SI} value=${latD} onChange=${setLatD} max=89 lbl="도°"/><${SI} value=${latM} onChange=${setLatM} max=59 lbl="분'"/><${SI} value=${latS} onChange=${setLatS} max=59.9 step=0.1 lbl='초"'/><div class="flex gap-1"><${DBtn} val="N" cur=${latDir} set=${setLatDir}/><${DBtn} val="S" cur=${latDir} set=${setLatDir}/></div></div>`}
                        ${type==='DDM' && html`<div class="flex gap-1.5 items-end"><${SI} value=${latDd} onChange=${setLatDd} max=89 lbl="도°"/><div class="flex flex-col gap-0.5 flex-[2] min-w-0"><span class="text-[8px] text-slate-400 font-black text-center">분.소수'</span><input type="number" value=${latDm} onInput=${e=>setLatDm(parseFloat(e.target.value)||0)} step=0.001 min=0 max=59.999 class="w-full bg-white border border-slate-200 rounded-lg px-2 py-2 text-sm font-bold text-center outline-none"/></div><div class="flex gap-1"><${DBtn} val="N" cur=${latDdir} set=${setLatDdir}/><${DBtn} val="S" cur=${latDdir} set=${setLatDdir}/></div></div>`}
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">경도 (Longitude)</label>
                        ${type==='DD' && html`<div class="flex gap-2 items-center"><input type="number" value=${lonDD} onInput=${e=>setLonDD(parseFloat(e.target.value)||0)} step=0.0001 min=-180 max=180 class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-1 focus:ring-blue-500"/><span class="text-xs text-slate-400">° (E+ W-)</span></div>`}
                        ${type==='DMS' && html`<div class="flex gap-1.5 items-end"><${SI} value=${lonD} onChange=${setLonD} max=179 lbl="도°"/><${SI} value=${lonM} onChange=${setLonM} max=59 lbl="분'"/><${SI} value=${lonS} onChange=${setLonS} max=59.9 step=0.1 lbl='초"'/><div class="flex gap-1"><${DBtn} val="E" cur=${lonDir} set=${setLonDir}/><${DBtn} val="W" cur=${lonDir} set=${setLonDir}/></div></div>`}
                        ${type==='DDM' && html`<div class="flex gap-1.5 items-end"><${SI} value=${lonDd} onChange=${setLonDd} max=179 lbl="도°"/><div class="flex flex-col gap-0.5 flex-[2] min-w-0"><span class="text-[8px] text-slate-400 font-black text-center">분.소수'</span><input type="number" value=${lonDm} onInput=${e=>setLonDm(parseFloat(e.target.value)||0)} step=0.001 min=0 max=59.999 class="w-full bg-white border border-slate-200 rounded-lg px-2 py-2 text-sm font-bold text-center outline-none"/></div><div class="flex gap-1"><${DBtn} val="E" cur=${lonDdir} set=${setLonDdir}/><${DBtn} val="W" cur=${lonDdir} set=${setLonDdir}/></div></div>`}
                    </div>
                </div>
                ${valid ? html`
                    <div class="result-box rounded-xl p-4 space-y-3">
                        <div class="border-b border-slate-700 pb-3">
                            <div class="text-[9px] text-slate-400 font-black uppercase mb-1">십진도 DD</div>
                            <div class="font-mono text-xs text-white font-bold space-y-0.5">
                                <div>${ld} ${Math.abs(latDec).toFixed(6)}°</div>
                                <div>${lo} ${Math.abs(lonDec).toFixed(6)}°</div>
                            </div>
                        </div>
                        <div class="border-b border-slate-700 pb-3">
                            <div class="text-[9px] text-slate-400 font-black uppercase mb-1">도분초 DMS</div>
                            <div class="font-mono text-xs text-white font-bold space-y-0.5">
                                <div>${ld} ${latDMS.d}° ${latDMS.m}' ${latDMS.s.toFixed(2)}"</div>
                                <div>${lo} ${lonDMS.d}° ${lonDMS.m}' ${lonDMS.s.toFixed(2)}"</div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[9px] text-slate-400 font-black uppercase mb-1">도분 DDM</div>
                            <div class="font-mono text-xs text-white font-bold space-y-0.5">
                                <div>${ld} ${latDMS.d}° ${(latDMS.m+latDMS.s/60).toFixed(4)}'</div>
                                <div>${lo} ${lonDMS.d}° ${(lonDMS.m+lonDMS.s/60).toFixed(4)}'</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-3 text-[10px] font-mono text-slate-700 break-all">
                        <div class="text-[9px] text-slate-400 font-black uppercase mb-1">ICAO 형식</div>
                        ${ld}${String(latDMS.d).padStart(2,'0')}${String(latDMS.m).padStart(2,'0')}${latDMS.s.toFixed(0).padStart(2,'0')} ${lo}${String(lonDMS.d).padStart(3,'0')}${String(lonDMS.m).padStart(2,'0')}${lonDMS.s.toFixed(0).padStart(2,'0')}
                    </div>
                ` : html`<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-600 font-bold">유효하지 않은 좌표입니다.</div>`}
                <div class="space-y-1">
                    <div class="text-[9px] text-slate-400 font-black uppercase">지도</div>
                    <div ref=${mapRef} style="height:260px;border-radius:12px;overflow:hidden;z-index:0;" class="border border-slate-200 w-full"></div>
                </div>
            </div>
        </div>
    </div>`;
}

            <div class="bg-slate-800 border-b border-slate-700">
                <div class="max-w-5xl mx-auto px-1 overflow-x-auto scrollbar-hide">
                    <div class="flex">
                        ${TABS.map(t => html`<button key=${t.id} onClick=${()=>setTab(t.id)}
                            class=${'flex items-center gap-1 px-2.5 sm:px-3 py-2.5 text-[10px] sm:text-xs font-black whitespace-nowrap transition-all border-b-2 ' +
                                (tab===t.id?'border-blue-500 text-blue-400':'border-transparent text-slate-400')}>
                            <span>${ICONS[t.icon]||''}</span>
                            <span class="hidden sm:inline">${t.label}</span>
                            <span class="sm:hidden">${t.short}</span>
                        </button>`)}
                    </div>
                </div>
            </div>
        </div>
        <main class="flex-1 max-w-5xl mx-auto w-full px-3 sm:px-6 py-5">
            <${TabContent} tab=${tab} />
        </main>
        <footer class="bg-slate-900 text-slate-500 text-[9px] py-3 text-center font-bold uppercase tracking-widest">
            E6B Flight Computer · For Training Use Only · Not for Navigation
        </footer>
    </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
