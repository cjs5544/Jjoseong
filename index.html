        // ======================= PA APP (보정값/계산 로직 절대 변경 금지) =======================
        const PAApp = ({ onSwitchMode }) => {
            const [imgSrc] = useState("./pa_chart.png");
            const [imgLoaded, setImgLoaded] = useState(false);
            const [dimensions, setDimensions] = useState({ width: 0, height: 0 });
            const [dragging, setDragging] = useState(null);
            const [zoom, setZoom] = useState(100);
            const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.matchMedia('(max-width: 1023px)').matches);
            useEffect(() => {
                const mq = window.matchMedia('(max-width: 1023px)');
                const handler = (e) => setIsMobile(e.matches);
                if (mq.addEventListener) mq.addEventListener('change', handler);
                else mq.addListener(handler);
                return () => {
                    if (mq.removeEventListener) mq.removeEventListener('change', handler);
                    else mq.removeListener(handler);
                };
            }, []);
            const zoomMax = isMobile ? 250 : 150;
            const [isCalibMode, setIsCalibMode] = useState(false);
            const [isPanelCalibMode, setIsPanelCalibMode] = useState(false);
            const [activePaIdx, setActivePaIdx] = useState(0);
            const [userDefault, setUserDefault] = useState(() => {
                try {
                    const saved = localStorage.getItem('aw139_calib_default');
                    return saved ? JSON.parse(saved) : MASTER_CALIB_DEFAULTS;
                } catch {
                    return MASTER_CALIB_DEFAULTS;
                }
            });
            const [isOatCalibMode, setIsOatCalibMode] = useState(false);
            const [activeOatTempIdx, setActiveOatTempIdx] = useState(0);
            const [activeOatPanel, setActiveOatPanel] = useState('itt');
            const [autoOat, setAutoOat] = useState(false);
            const [oatDeleteMode, setOatDeleteMode] = useState(false);

            const [calib, setCalib] = useState(() => {
                try {
                    const saved = localStorage.getItem('aw139_calib');
                    if (saved) {
                        const p = JSON.parse(saved);
                        return { ...MASTER_CALIB_DEFAULTS, ...p,
                            ittOatLines: p.ittOatLines || OAT_NULL(),
                            ngOatLines:  p.ngOatLines  || OAT_NULL() };
                    }
                } catch {}
                return MASTER_CALIB_DEFAULTS;
            });

            const handleTqInput = (val) => {
                const tq = parseFloat(val);
                if (isNaN(tq)) return;
                const x = calib.tq_left + (tq - 90) / (105 - 90) * (calib.tq_right - calib.tq_left);
                setLines(p => ({ ...p, tq: Math.max(calib.tq_left, Math.min(calib.tq_right, x)) }));
            };

            const handlePaInput = (val) => {
                const pa = parseFloat(val);
                if (isNaN(pa)) return;
                const xRatio = (lines.tq - calib.tq_left) / (calib.tq_right - calib.tq_left);
                const yPoints = PA_VALUES.map(v => getYAtTQ(v, xRatio));
                for (let i = 0; i < PA_VALUES.length - 1; i++) {
                    if (pa >= PA_VALUES[i] && pa <= PA_VALUES[i + 1]) {
                        const t = (pa - PA_VALUES[i]) / (PA_VALUES[i + 1] - PA_VALUES[i]);
                        const y = yPoints[i] - t * (yPoints[i] - yPoints[i + 1]);
                        setLines(p => ({ ...p, pa: Math.max(0, Math.min(1, y)) }));
                        return;
                    }
                }
                if (pa <= PA_VALUES[0]) setLines(p => ({ ...p, pa: yPoints[0] }));
                else setLines(p => ({ ...p, pa: yPoints[PA_VALUES.length - 1] }));
            };

            const saveAsDefault = async () => {
                localStorage.setItem('aw139_calib_default', JSON.stringify(calib));
                setUserDefault(calib);

                const newDefaults = `const MASTER_CALIB_DEFAULTS = ${JSON.stringify(calib)};`;
                let html;
                try {
                    const res = await fetch(location.href);
                    html = await res.text();
                } catch (e) {
                    html = document.documentElement.outerHTML;
                }
                const replaced = html.replace(/(?:const|var)\s+MASTER_CALIB_DEFAULTS\s*=\s*\{[\s\S]*?\};/g, newDefaults);
                const blob = new Blob([replaced], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                const currentName = (location.pathname.split('/').pop() || 'AW139.html');
                a.download = decodeURIComponent(currentName);
                a.click();
                URL.revokeObjectURL(a.href);
            };
            const [activeEngine, setActiveEngine] = useState(1);
            const eng1Checked = activeEngine === 1;
            const eng2Checked = activeEngine === 2;
            const [lines, setLines] = useState({ pa: 0.85, tq: 0.15, itt: 0.45, ng: 0.75 });
            const [results, setResults] = useState({
                pa: 0, oat: 15, tq: 95,
                max_itt: 710, max_ng: 98.5,
                actual_itt1: 680, actual_ng1: 96.0,
                actual_itt2: 680, actual_ng2: 96.0
            });

            const [lineWidth, setLineWidth] = useState(2);

            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);

            const canvasRef = useRef(null);
            const imgRef = useRef(null);
            const containerRef = useRef(null);
            const chartAreaRef = useRef(null);
            const pinchRef = useRef(null);
            const zoomRef = useRef(zoom);
            useEffect(() => { zoomRef.current = zoom; }, [zoom]);

            useEffect(() => {
                const el = chartAreaRef.current;
                if (!el) return;
                const onTouchStart = (e) => {
                    if (e.touches.length === 2) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        pinchRef.current = { dist: Math.hypot(dx, dy), zoom: zoomRef.current };
                    }
                };
                const onTouchMove = (e) => {
                    if (e.touches.length === 2 && pinchRef.current) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const ratio = Math.hypot(dx, dy) / pinchRef.current.dist;
                        setZoom(Math.round(Math.max(50, Math.min(250, pinchRef.current.zoom * ratio))));
                    }
                };
                const onTouchEnd = (e) => { if (e.touches.length < 2) pinchRef.current = null; };
                el.addEventListener('touchstart', onTouchStart, { passive: false });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                return () => {
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                };
            }, [imgLoaded]);

            const handleImgLoad = () => {
                if (imgRef.current) {
                    setDimensions({ width: imgRef.current.clientWidth, height: imgRef.current.clientHeight });
                    setImgLoaded(true);
                }
            };

            useEffect(() => {
                const img = imgRef.current;
                if (img && img.complete && img.naturalWidth > 0) handleImgLoad();
            }, []);

            useEffect(() => {
                const handleResize = () => {
                    if (imgRef.current) setDimensions({ width: imgRef.current.clientWidth, height: imgRef.current.clientHeight });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [zoom, imgLoaded]);

            const getYAtTQ = (paVal, xRatio) => {
                const line = calib.paLines[paVal];
                return line ? line.l + xRatio * (line.r - line.l) : 0;
            };

            const calculatePA = (x, y) => {
                const xRatio = (x - calib.tq_left) / (calib.tq_right - calib.tq_left);
                const yPoints = PA_VALUES.map(v => getYAtTQ(v, xRatio));
                for (let i = 0; i < yPoints.length - 1; i++) {
                    if (y <= yPoints[i] && y >= yPoints[i+1]) {
                        return PA_VALUES[i] + ((yPoints[i] - y) / (yPoints[i] - yPoints[i+1])) * (PA_VALUES[i+1] - PA_VALUES[i]);
                    }
                }
                return y > yPoints[0] ? PA_VALUES[0] : PA_VALUES[15];
            };

            // Catmull-Rom: x at given y along a sorted pts array
            const catmullX = (pts, targetY) => {
                const s = [...pts].sort((a, b) => a.y - b.y);
                if (targetY <= s[0].y) return s[0].x;
                if (targetY >= s[s.length-1].y) return s[s.length-1].x;
                for (let i = 0; i < s.length - 1; i++) {
                    if (targetY >= s[i].y && targetY <= s[i+1].y) {
                        const t = (targetY - s[i].y) / (s[i+1].y - s[i].y);
                        const p0 = s[Math.max(0,i-1)], p1 = s[i], p2 = s[i+1], p3 = s[Math.min(s.length-1,i+2)];
                        const t2 = t*t, t3 = t2*t;
                        return 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
                    }
                }
                return null;
            };

            // Draw smooth Catmull-Rom curve through pts on canvas
            const drawCatmullCurve = (ctx, pts, w, h) => {
                if (!pts || pts.length < 2) return;
                const cp = pts.map(p => ({x: p.x*w, y: p.y*h}));
                ctx.beginPath();
                ctx.moveTo(cp[0].x, cp[0].y);
                for (let i = 0; i < cp.length-1; i++) {
                    const p0 = cp[Math.max(0,i-1)], p1 = cp[i], p2 = cp[i+1], p3 = cp[Math.min(cp.length-1,i+2)];
                    ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6, p1.y+(p2.y-p0.y)/6,
                                      p2.x-(p3.x-p1.x)/6, p2.y-(p3.y-p1.y)/6,
                                      p2.x, p2.y);
                }
                ctx.stroke();
            };

            const getOatLineX = (oatLines, oat, paY) => {
                const clampedOat = Math.max(OAT_TEMPS[0], Math.min(OAT_TEMPS[OAT_TEMPS.length-1], oat));
                let t0idx = OAT_TEMPS.length - 2;
                for (let i = 0; i < OAT_TEMPS.length - 1; i++) {
                    if (clampedOat >= OAT_TEMPS[i] && clampedOat <= OAT_TEMPS[i+1]) { t0idx = i; break; }
                }
                const t0 = OAT_TEMPS[t0idx], t1 = OAT_TEMPS[t0idx + 1];
                const line0 = oatLines[String(t0)], line1 = oatLines[String(t1)];
                if (!line0 || !line0.pts || line0.pts.length < 2) return null;
                if (!line1 || !line1.pts || line1.pts.length < 2) return null;
                const x0 = catmullX(line0.pts, paY);
                const x1 = catmullX(line1.pts, paY);
                if (x0 === null || x1 === null) return null;
                return x0 + ((clampedOat - t0) / (t1 - t0)) * (x1 - x0);
            };

            const didInitRef = useRef(false);
            useEffect(() => {
                if (!imgLoaded || didInitRef.current) return;
                didInitRef.current = true;
                // 기본값: TQ = 95, PA = 0
                const tqX = calib.tq_left + (95 - 90) / (105 - 90) * (calib.tq_right - calib.tq_left);
                const newTq = Math.max(calib.tq_left, Math.min(calib.tq_right, tqX));
                const xRatio = (newTq - calib.tq_left) / (calib.tq_right - calib.tq_left);
                const yPoints = PA_VALUES.map(v => getYAtTQ(v, xRatio));
                // PA_VALUES[1] === 0
                const paY = yPoints[1];
                setLines(p => ({ ...p, tq: newTq, pa: Math.max(0, Math.min(1, paY)) }));
            }, [imgLoaded, calib]);

            useEffect(() => {
                if (!autoOat || !imgLoaded || !calib.ittOatLines || !calib.ngOatLines) return;
                const newIttX = getOatLineX(calib.ittOatLines, results.oat, lines.pa);
                const newNgX  = getOatLineX(calib.ngOatLines,  results.oat, lines.pa);
                if (newIttX !== null && newNgX !== null) {
                    setLines(prev => {
                        if (Math.abs(prev.itt - newIttX) < 0.0001 && Math.abs(prev.ng - newNgX) < 0.0001) return prev;
                        return { ...prev, itt: newIttX, ng: newNgX };
                    });
                }
            }, [results.oat, lines.pa, autoOat, imgLoaded, calib.ittOatLines, calib.ngOatLines]);

            useEffect(() => {
                if (!imgLoaded) return;
                const mapVal = (val, inMin, inMax, outMin, outMax) => outMin + (val - inMin) * (outMax - outMin) / (inMax - inMin);
                setResults(prev => ({
                    ...prev,
                    tq: Math.round(mapVal(lines.tq, calib.tq_left, calib.tq_right, 90, 105)),
                    pa: Math.round(calculatePA(lines.tq, lines.pa)),
                    max_itt:  Math.round(mapVal(lines.itt,  calib.itt_left, calib.itt_right, 450, 850)),
                    max_ng:   parseFloat(mapVal(lines.ng,   calib.ng_left,  calib.ng_right,  80, 105).toFixed(1)),
                }));
                draw();
            }, [lines, calib, dimensions, imgLoaded, lineWidth, eng1Checked, eng2Checked]);

            const draw = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const { width, height } = dimensions;
                ctx.clearRect(0, 0, width, height);
                const paY = lines.pa * height;
                ctx.lineWidth = 2;

                const drawLineInternal = (x1, y1, x2, y2, color, widthLine = lineWidth) => {
                    ctx.strokeStyle = color; ctx.lineWidth = widthLine; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                };

                drawLineInternal(lines.tq * width, calib.pa_top * height, lines.tq * width, paY, '#8b5cf6');
                drawLineInternal(lines.tq * width, paY, width * calib.ng_right, paY, '#f43f5e');

                // ITT / NG 제한선 — 양 엔진 공유 (패널당 1개)
                ctx.globalAlpha = 1.0;
                ctx.setLineDash([]);
                drawLineInternal(lines.itt * width, calib.pa_top * height, lines.itt * width, calib.pa_bottom * height, '#10b981');
                drawLineInternal(lines.ng * width,  calib.pa_top * height, lines.ng * width,  calib.pa_bottom * height, '#eab308');

                ctx.fillStyle = '#f43f5e';
                ctx.beginPath(); ctx.arc(lines.tq * width, paY, 5, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

                if (isPanelCalibMode) {
                    ctx.setLineDash([5, 5]); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
                    ctx.strokeRect(calib.tq_left * width, calib.pa_top * height, (calib.tq_right - calib.tq_left) * width, (calib.pa_bottom - calib.pa_top) * height);
                    ctx.strokeRect(calib.itt_left * width, calib.pa_top * height, (calib.itt_right - calib.itt_left) * width, (calib.pa_bottom - calib.pa_top) * height);
                    ctx.strokeRect(calib.ng_left * width, calib.pa_top * height, (calib.ng_right - calib.ng_left) * width, (calib.pa_bottom - calib.pa_top) * height);
                    ctx.setLineDash([]);
                }

                if (isCalibMode) {
                    PA_VALUES.forEach((v, idx) => {
                        const isActive = idx === activePaIdx;
                        ctx.strokeStyle = PA_COLORS[idx];
                        ctx.lineWidth = isActive ? 4.0 : 2.0;
                        ctx.setLineDash(isActive ? [] : [6, 4]);
                        ctx.globalAlpha = isActive ? 1.0 : 0.95;
                        ctx.beginPath();
                        ctx.moveTo(calib.tq_left * width, calib.paLines[v].l * height);
                        ctx.lineTo(calib.tq_right * width, calib.paLines[v].r * height);
                        ctx.stroke();
                        if (isActive) {
                            ctx.fillStyle = PA_COLORS[idx];
                            ctx.beginPath(); ctx.arc(calib.tq_left * width, calib.paLines[v].l * height, 9, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(calib.tq_right * width, calib.paLines[v].r * height, 9, 0, Math.PI * 2); ctx.fill();
                        }
                    });
                    ctx.globalAlpha = 1.0; ctx.setLineDash([]);
                }

                if (isOatCalibMode || autoOat) {
                    ['itt', 'ng'].forEach(panel => {
                        const oatLinesData = panel === 'itt' ? calib.ittOatLines : calib.ngOatLines;
                        if (!oatLinesData) return;
                        OAT_TEMPS.forEach((temp, idx) => {
                            const line = oatLinesData[String(temp)];
                            if (!line || !line.pts || line.pts.length < 2) return;
                            const isActiveLine = isOatCalibMode && panel === activeOatPanel && idx === activeOatTempIdx;
                            ctx.strokeStyle = OAT_COLORS_ARR[idx];
                            ctx.lineWidth = isActiveLine ? 2.5 : 1.2;
                            ctx.setLineDash(isActiveLine ? [] : [4, 3]);
                            ctx.globalAlpha = isActiveLine ? 1.0 : (autoOat ? 0.35 : 0.6);
                            drawCatmullCurve(ctx, line.pts, width, height);
                            // 활성선: 각 점에 드래그 핸들 표시
                            if (isActiveLine) {
                                ctx.globalAlpha = 1.0; ctx.setLineDash([]);
                                line.pts.forEach((pt, pi) => {
                                    const isDeleteHover = oatDeleteMode;
                                    ctx.fillStyle = isDeleteHover ? '#ef4444' : OAT_COLORS_ARR[idx];
                                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                                    ctx.beginPath(); ctx.arc(pt.x * width, pt.y * height, 8, 0, Math.PI * 2);
                                    ctx.fill(); ctx.stroke();
                                    if (isDeleteHover) {
                                        ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                                        ctx.fillText('×', pt.x * width, pt.y * height);
                                    }
                                });
                            }
                        });
                        ctx.globalAlpha = 1.0; ctx.setLineDash([]);
                    });
                    // 미보정 활성선: 클릭 안내 텍스트
                    if (isOatCalibMode) {
                        const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                        const panelLeft = activeOatPanel === 'itt' ? calib.itt_left : calib.ng_left;
                        const panelRight = activeOatPanel === 'itt' ? calib.itt_right : calib.ng_right;
                        const activeLine = calib[oatKey][String(OAT_TEMPS[activeOatTempIdx])];
                        if (!activeLine || !activeLine.pts || activeLine.pts.length < 2) {
                            const midX = (panelLeft + panelRight) / 2 * width;
                            const midY = (calib.pa_top + calib.pa_bottom) / 2 * height;
                            ctx.globalAlpha = 0.7; ctx.fillStyle = OAT_COLORS_ARR[activeOatTempIdx];
                            ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText('OAT선 위를 클릭하여 점 추가', midX, midY);
                            ctx.globalAlpha = 1.0;
                        }
                    }
                }
            };

            const handleStart = (e) => {
                if (!imgLoaded) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) / rect.width;
                const y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) / rect.height;
                const t = 0.05;

                if (isPanelCalibMode) {
                    if (Math.abs(x - calib.tq_left) < t) { setDragging('p_tql'); return; }
                    if (Math.abs(x - calib.tq_right) < t) { setDragging('p_tqr'); return; }
                    if (Math.abs(x - calib.itt_left) < t) { setDragging('p_ittl'); return; }
                    if (Math.abs(x - calib.itt_right) < t) { setDragging('p_ittr'); return; }
                    if (Math.abs(x - calib.ng_left) < t) { setDragging('p_ngl'); return; }
                    if (Math.abs(x - calib.ng_right) < t) { setDragging('p_ngr'); return; }
                    if (Math.abs(y - calib.pa_top) < t) { setDragging('p_pat'); return; }
                    if (Math.abs(y - calib.pa_bottom) < t) { setDragging('p_pab'); return; }
                }

                if (isCalibMode) {
                    const v = PA_VALUES[activePaIdx], line = calib.paLines[v];
                    if (Math.sqrt(Math.pow(x - calib.tq_left, 2) + Math.pow(y - line.l, 2)) < t) { setDragging('active_l'); return; }
                    if (Math.sqrt(Math.pow(x - calib.tq_right, 2) + Math.pow(y - line.r, 2)) < t) { setDragging('active_r'); return; }
                }
                if (isOatCalibMode) {
                    const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                    const panelLeft = activeOatPanel === 'itt' ? calib.itt_left : calib.ng_left;
                    const panelRight = activeOatPanel === 'itt' ? calib.itt_right : calib.ng_right;
                    const temp = OAT_TEMPS[activeOatTempIdx];
                    const ln = calib[oatKey][String(temp)];
                    const pts = (ln && ln.pts) ? ln.pts : [];
                    const hitR = 0.04;

                    if (oatDeleteMode) {
                        // 삭제 모드: 점 클릭 시 제거
                        for (let i = 0; i < pts.length; i++) {
                            if (Math.hypot(x - pts[i].x, y - pts[i].y) < hitR) {
                                const newPts = pts.filter((_, idx) => idx !== i);
                                setCalib(p => ({...p, [oatKey]: {...p[oatKey], [String(temp)]: {pts: newPts.length >= 2 ? newPts : null}}}));
                                return;
                            }
                        }
                        return;
                    }

                    // 기존 점 근처 클릭 → 드래그
                    for (let i = 0; i < pts.length; i++) {
                        if (Math.hypot(x - pts[i].x, y - pts[i].y) < hitR) { setDragging(`oat_${i}`); return; }
                    }

                    // 패널 영역 클릭 → 새 점 추가
                    if (x >= panelLeft - 0.01 && x <= panelRight + 0.01 && y >= calib.pa_top - 0.01 && y <= calib.pa_bottom + 0.01) {
                        const cx = Math.max(panelLeft, Math.min(panelRight, x));
                        const cy = Math.max(calib.pa_top, Math.min(calib.pa_bottom, y));
                        const newPts = [...pts, {x: cx, y: cy}].sort((a, b) => a.y - b.y);
                        setCalib(p => ({...p, [oatKey]: {...p[oatKey], [String(temp)]: {pts: newPts}}}));
                    }
                    return;
                }
                if (Math.abs(y - lines.pa) < t) setDragging('pa');
                else if (Math.abs(x - lines.tq) < t) setDragging('tq');
                else if (Math.abs(x - lines.itt) < t) setDragging('itt');
                else if (Math.abs(x - lines.ng) < t)  setDragging('ng');
            };

            const handleMove = (e) => {
                if (!dragging) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(1, ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) / rect.width));
                const y = Math.max(0, Math.min(1, ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) / rect.height));

                if (isPanelCalibMode) {
                    const key = dragging.replace('p_', '');
                    const fieldMap = { tql: 'tq_left', tqr: 'tq_right', ittl: 'itt_left', ittr: 'itt_right', ngl: 'ng_left', ngr: 'ng_right', pat: 'pa_top', pab: 'pa_bottom' };
                    setCalib(p => ({ ...p, [fieldMap[key]]: dragging.endsWith('t') || dragging.endsWith('b') ? y : x }));
                } else if (isCalibMode && dragging.startsWith('active')) {
                    const v = PA_VALUES[activePaIdx];
                    setCalib(p => ({ ...p, paLines: { ...p.paLines, [v]: { ...p.paLines[v], [dragging === 'active_l' ? 'l' : 'r']: y } } }));
                } else if (isOatCalibMode && dragging && dragging.startsWith('oat_')) {
                    const ptIdx = parseInt(dragging.slice(4));
                    const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                    const panelLeft = activeOatPanel === 'itt' ? calib.itt_left : calib.ng_left;
                    const panelRight = activeOatPanel === 'itt' ? calib.itt_right : calib.ng_right;
                    const temp = OAT_TEMPS[activeOatTempIdx];
                    const cx = Math.max(panelLeft, Math.min(panelRight, x));
                    const cy = Math.max(calib.pa_top, Math.min(calib.pa_bottom, y));
                    setCalib(p => {
                        const ln = p[oatKey][String(temp)];
                        const newPts = [...(ln.pts || [])];
                        newPts[ptIdx] = {x: cx, y: cy};
                        return {...p, [oatKey]: {...p[oatKey], [String(temp)]: {pts: newPts}}};
                    });
                } else {
                    let clampedX = x;
                    if (dragging === 'tq')   clampedX = Math.max(calib.tq_left,  Math.min(calib.tq_right,  x));
                    if (dragging === 'itt')  clampedX = Math.max(calib.itt_left, Math.min(calib.itt_right, x));
                    if (dragging === 'ng')   clampedX = Math.max(calib.ng_left,  Math.min(calib.ng_right,  x));
                    setLines(p => ({ ...p, [dragging]: dragging === 'pa' ? y : clampedX }));
                }
            };

            const handleEnd = () => {
                if (dragging && dragging.startsWith('oat_') && isOatCalibMode) {
                    const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                    const temp = OAT_TEMPS[activeOatTempIdx];
                    setCalib(p => {
                        const ln = p[oatKey][String(temp)];
                        if (!ln || !ln.pts) return p;
                        return {...p, [oatKey]: {...p[oatKey], [String(temp)]: {pts: [...ln.pts].sort((a,b) => a.y - b.y)}}};
                    });
                }
                setDragging(null);
            };

            const isModified = (v) => Math.abs(calib.paLines[v].l - MASTER_CALIB_DEFAULTS.paLines[v].l) > 0.001;
            const isAbnormal1 = (results.max_itt  - results.actual_itt1) < 0 || (results.max_ng  - results.actual_ng1) < 0;
            const isAbnormal2 = (results.max_itt - results.actual_itt2) < 0 || (results.max_ng - results.actual_ng2) < 0;
            const isAbnormal = isAbnormal1 || isAbnormal2;

            const analyzeWithGemini = async () => {
                setIsAnalyzing(true);
                setAiAnalysis("");
                setShowAiModal(true);
                const apiKey = "";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const statusStr = isAbnormal ? "비정상(ABNORMAL)" : "정상(NORMAL)";
                const prompt = `당신은 Leonardo AW139 정비 전문가입니다. 다음 PA 체크 결과를 분석해주세요.
                고도: ${results.pa}ft, 외기온도: ${results.oat}°C, 토크: ${results.tq}%.
                #1엔진 - ITT 실제: ${results.actual_itt1}°C (최대허용: ${results.max_itt}), NG 실제: ${results.actual_ng1}% (최대허용: ${results.max_ng}).
                #2엔진 - ITT 실제: ${results.actual_itt2}°C (최대허용: ${results.max_itt}), NG 실제: ${results.actual_ng2}% (최대허용: ${results.max_ng}).
                현재 판정은 ${statusStr}입니다. 정비사의 관점에서 각 엔진별 성능 요약과 필요한 조치 사항을 한국어로 3-4문장 이내로 전문적으로 설명해주세요.`;

                const fetchWithRetry = async (retries = 0) => {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (retries < 5) {
                            const delay = Math.pow(2, retries) * 1000;
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries + 1);
                        }
                        throw err;
                    }
                };

                try {
                    const text = await fetchWithRetry();
                    setAiAnalysis(text || "분석 결과를 생성할 수 없습니다.");
                } catch (error) {
                    setAiAnalysis("AI 분석 도중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            useEffect(() => { localStorage.setItem('aw139_calib', JSON.stringify(calib)); }, [calib]);

            useEffect(() => { lucide.createIcons(); }, [isCalibMode, isPanelCalibMode, isOatCalibMode, showAiModal]);

            return (
                <div className="flex flex-col h-screen">
                    {/* Header (CG와 통일된 다크 테마, 동일 높이) */}
                    <header className="bg-slate-900 text-white px-4 sm:px-6 py-4 shadow-lg z-30 shrink-0 print:relative print:bg-white print:text-black print:shadow-none print:border-b-2 print:border-slate-800">
                        <div className="max-w-7xl mx-auto w-full flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                <div className="p-2 bg-blue-600 rounded-lg print:hidden"><Icon name="gauge" size={24} /></div>
                                <div>
                                    <h1 className="text-base sm:text-xl font-black tracking-tight uppercase leading-none">AW139 Engine Performance</h1>
                                    <div className="flex items-center gap-3 mt-1.5 font-bold">
                                        <span className="text-[10px] text-slate-400 uppercase tracking-tighter font-bold">AI Integrated v3.6</span>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-tighter font-bold">Incheon 119 Fire Aviation Unit</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between sm:justify-end gap-2 w-full sm:w-auto no-print">
                                <div className="flex bg-slate-800 rounded-lg p-0.5 border border-slate-700">
                                    <button onClick={onSwitchMode} className="px-3 py-1.5 rounded-md text-[10px] font-black text-slate-400 hover:text-white transition-all flex items-center gap-1">
                                        <Icon name="helicopter" size={12} /> W&B
                                    </button>
                                    <button className="px-3 py-1.5 rounded-md text-[10px] font-black bg-blue-600 text-white shadow">Engine PA</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={saveAsDefault} title="기본값 저장 — 패널 보정 및 PA 보정으로 조정한 값을 새 기본값으로 저장합니다. (보정 작업을 마친 후 사용하세요)" className="p-2 bg-slate-800 text-emerald-400 rounded-lg border border-slate-700 shadow-md transition-all active:scale-95"><Icon name="save" size={18} /></button>
                                    <button onClick={() => setCalib(userDefault)} title="기본값으로 초기화" className="p-2 bg-slate-800 text-blue-400 rounded-lg border border-slate-700 shadow-md transition-all active:scale-95"><Icon name="rotate-ccw" size={18} /></button>
                                    <button onClick={() => window.print()} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black shadow-md transition-all active:scale-95"><Icon name="file-text" size={16} /><span className="hidden sm:inline">PDF 저장</span></button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* 보정 도구 바 (헤더 외부, 라이트 배경) */}
                    <div className="bg-white border-b border-slate-200 px-4 sm:px-6 py-2 shrink-0 no-print">
                        <div className="max-w-7xl mx-auto w-full flex items-center gap-2 overflow-x-auto scrollbar-hide">
                            <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200 shrink-0">
                                <Icon name="zoom-in" size={12} className="text-slate-400" />
                                <input type="range" min="50" max={zoomMax} value={zoom} onChange={(e) => setZoom(parseInt(e.target.value))} className="w-14 h-1 accent-blue-500" />
                                <span className="text-[9px] font-bold text-slate-500 w-7">{zoom}%</span>
                            </div>
                            <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200 shrink-0">
                                <span className="text-[9px] font-bold text-slate-400">굵기</span>
                                <button onClick={() => setLineWidth(w => Math.max(1, w - 1))} className="w-5 h-5 flex items-center justify-center bg-white border border-slate-300 rounded text-xs font-bold text-slate-700">−</button>
                                <span className="text-[11px] font-black text-slate-600 w-4 text-center">{lineWidth}</span>
                                <button onClick={() => setLineWidth(w => Math.min(8, w + 1))} className="w-5 h-5 flex items-center justify-center bg-white border border-slate-300 rounded text-xs font-bold text-slate-700">+</button>
                            </div>
                            <button onClick={() => { setIsPanelCalibMode(!isPanelCalibMode); setIsCalibMode(false); }} className={`px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 ${isPanelCalibMode ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>패널 보정</button>
                            <button onClick={() => { setIsCalibMode(!isCalibMode); setIsPanelCalibMode(false); setIsOatCalibMode(false); }} className={`px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 ${isCalibMode ? 'bg-orange-500 text-white' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>PA 보정</button>
                            {isCalibMode && (
                                <select value={activePaIdx} onChange={e => setActivePaIdx(parseInt(e.target.value))}
                                    className="px-2 py-1 rounded text-[10px] font-bold border border-orange-400 bg-orange-50 text-orange-700 shadow shrink-0">
                                    {PA_VALUES.map((v, i) => (
                                        <option key={v} value={i}>{v >= 0 ? '+' : ''}{v} ft</option>
                                    ))}
                                </select>
                            )}
                            <button onClick={() => { setIsOatCalibMode(!isOatCalibMode); setIsCalibMode(false); setIsPanelCalibMode(false); }} className={`px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 ${isOatCalibMode ? 'bg-teal-600 text-white' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>OAT 보정</button>
                            <button onClick={() => setAutoOat(v => !v)} title={autoOat ? "자동계산 ON (클릭 시 OFF)" : "OAT 보정 완료 후 자동계산 ON"} className={`px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 ${autoOat ? 'bg-emerald-600 text-white' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>자동 ITT/NG</button>
                            {isOatCalibMode && (
                                <>
                                    <select value={activeOatPanel} onChange={e => { setActiveOatPanel(e.target.value); setOatDeleteMode(false); }} className="px-2 py-1 rounded text-[10px] font-bold border border-teal-400 bg-teal-50 text-teal-700 shadow shrink-0">
                                        <option value="itt">ITT 패널</option>
                                        <option value="ng">NG 패널</option>
                                    </select>
                                    <select value={activeOatTempIdx} onChange={e => { setActiveOatTempIdx(parseInt(e.target.value)); setOatDeleteMode(false); }} className="px-2 py-1 rounded text-[10px] font-bold border border-teal-400 bg-teal-50 text-teal-700 shadow shrink-0">
                                        {OAT_TEMPS.map((temp, i) => {
                                            const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                                            const ln = calib[oatKey] && calib[oatKey][String(OAT_TEMPS[i])];
                                            const cnt = (ln && ln.pts) ? ln.pts.length : 0;
                                            return <option key={temp} value={i}>{temp >= 0 ? '+' : ''}{temp}°C {cnt > 0 ? `(${cnt}pt)` : ''}</option>;
                                        })}
                                    </select>
                                    <button onClick={() => setOatDeleteMode(v => !v)} className={`px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 ${oatDeleteMode ? 'bg-red-500 text-white' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>점 삭제</button>
                                    <button onClick={() => {
                                        const oatKey = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines';
                                        const temp = OAT_TEMPS[activeOatTempIdx];
                                        if (confirm(`${temp >= 0 ? '+' : ''}${temp}°C 선의 모든 점을 초기화합니다.`))
                                            setCalib(p => ({...p, [oatKey]: {...p[oatKey], [String(temp)]: {pts: null}}}));
                                    }} className="px-2 py-1 rounded text-[10px] font-bold transition-all shadow shrink-0 bg-slate-50 text-slate-500 border border-slate-200">선 초기화</button>
                                    <span className="text-[9px] text-teal-600 font-bold shrink-0">
                                        {(() => { const k = activeOatPanel === 'itt' ? 'ittOatLines' : 'ngOatLines'; const ln = calib[k] && calib[k][String(OAT_TEMPS[activeOatTempIdx])]; const n = (ln && ln.pts) ? ln.pts.length : 0; return n < 2 ? '클릭으로 점 추가' : `${n}개 점 ✓`; })()}
                                    </span>
                                </>
                            )}
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden flex flex-col relative">
                        <div ref={chartAreaRef} className="flex-1 relative overflow-auto p-2 bg-slate-200/40 print-chart-area text-center">
                            <div ref={containerRef} className={`relative inline-block select-none bg-white shadow-xl rounded border print-chart-container mx-auto ${(isCalibMode || isPanelCalibMode || isOatCalibMode) ? 'border-orange-400 border-2' : 'border-slate-300'}`}
                                style={{ width: `${isMobile ? zoom : zoom * 0.6}%`, transformOrigin: 'top center' }}
                                onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd} onMouseLeave={handleEnd}
                                onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd}>
                                <img ref={imgRef} src={imgSrc} alt="PA Chart" className="w-full block pointer-events-none" onLoad={handleImgLoad} />
                                <canvas ref={canvasRef} width={dimensions.width} height={dimensions.height} className="absolute top-0 left-0 w-full h-full pointer-events-none" />
                            </div>
                        </div>

                        <div className="bg-white border-t px-3 py-2 z-10 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] shrink-0">
                            <div className="max-w-6xl mx-auto flex flex-col lg:flex-row gap-2 lg:gap-3 lg:items-stretch">
                                {/* 입력값: 모바일 한 줄(grid-cols-3) / 데스크탑 좌측 수직 */}
                                <div className="grid grid-cols-3 lg:flex lg:flex-col gap-1 lg:w-44 lg:shrink-0">
                                    <EditableInputCard label="토크 (TQ)" value={results.tq} unit="%" color="border-purple-400" onCommit={handleTqInput} min={90} max={105} step={0.1} />
                                    <EditableInputCard label="기압고도 (PA)" value={results.pa} unit="ft" color="border-red-400" onCommit={handlePaInput} min={-1000} max={14000} step={100} />
                                    <EditableInputCard label="외기온도 (OAT)" value={results.oat} unit="°C" color={autoOat ? "border-emerald-400" : "border-slate-400"} onCommit={v => setResults(p => ({...p, oat: v}))} min={-50} max={60} step={1} tooltip={autoOat ? "자동계산 ON — OAT 변경 시 Max ITT/NG가 자동으로 업데이트됩니다." : "OAT 보정 버튼으로 패널 2/3의 OAT 선을 보정한 후 [자동 ITT/NG] 버튼을 켜면 자동으로 계산됩니다."} />
                                </div>
                                {/* 엔진: 모바일/데스크탑 모두 #1 | #2 좌우 배치 */}
                                <div className="flex-1 grid grid-cols-2 gap-2 lg:gap-3">
                                    <div className="flex flex-col gap-1 lg:border-l lg:pl-3 border-slate-100">
                                        <div className="flex items-center gap-1.5 flex-wrap">
                                            <button onClick={() => setActiveEngine(v => v === 1 ? null : 1)} className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest border transition-all ${eng1Checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white border-slate-300 text-slate-400'}`}>
                                                <span className={`w-2 h-2 rounded-full ${eng1Checked ? 'bg-white' : 'bg-slate-300'}`}></span>
                                                #1 Engine
                                            </button>
                                            <div className={`px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest border ${!isAbnormal1 ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-red-50 border-red-300 text-red-700 animate-pulse'}`}>
                                                {!isAbnormal1 ? '정상' : '이상'}
                                            </div>
                                        </div>
                                        <ComparisonRow label="ITT" actual={results.actual_itt1} max={results.max_itt} margin={(results.max_itt - results.actual_itt1).toFixed(1)} unit="°C" isAbnormal={isAbnormal1} onChangeActual={v => setResults(p => ({...p, actual_itt1: v}))} />
                                        <ComparisonRow label="NG" actual={results.actual_ng1} max={results.max_ng} margin={(results.max_ng - results.actual_ng1).toFixed(1)} unit="%" isAbnormal={isAbnormal1} onChangeActual={v => setResults(p => ({...p, actual_ng1: v}))} />
                                    </div>
                                    <div className="flex flex-col gap-1 border-l pl-2 lg:pl-3 border-slate-100">
                                        <div className="flex items-center gap-1.5 flex-wrap">
                                            <button onClick={() => setActiveEngine(v => v === 2 ? null : 2)} className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest border transition-all ${eng2Checked ? 'bg-cyan-500 border-cyan-500 text-white' : 'bg-white border-slate-300 text-slate-400'}`}>
                                                <span className={`w-2 h-2 rounded-full ${eng2Checked ? 'bg-white' : 'bg-slate-300'}`}></span>
                                                #2 Engine
                                            </button>
                                            <div className={`px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest border ${!isAbnormal2 ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-red-50 border-red-300 text-red-700 animate-pulse'}`}>
                                                {!isAbnormal2 ? '정상' : '이상'}
                                            </div>
                                        </div>
                                        <ComparisonRow label="ITT" actual={results.actual_itt2} max={results.max_itt} margin={(results.max_itt - results.actual_itt2).toFixed(1)} unit="°C" onChangeActual={v => setResults(p => ({...p, actual_itt2: v}))} />
                                        <ComparisonRow label="NG"  actual={results.actual_ng2}  max={results.max_ng}  margin={(results.max_ng  - results.actual_ng2).toFixed(1)}  unit="%" onChangeActual={v => setResults(p => ({...p, actual_ng2: v}))} />
                                    </div>
                                </div>
                                {/* AI 분석: 모바일 가로 풀폭 / 데스크탑 우측 세로 */}
                                <button onClick={analyzeWithGemini} className="shrink-0 w-full h-9 lg:w-20 lg:h-auto bg-blue-600 hover:bg-blue-700 text-white rounded-md shadow flex flex-row lg:flex-col items-center justify-center gap-2 lg:gap-1 transition-all group">
                                    <Icon name="sparkles" size={16} className="group-hover:scale-110 transition-transform" />
                                    <span className="text-[10px] font-black">AI 분석</span>
                                </button>
                            </div>
                        </div>

                        {showAiModal && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden fade-in">
                                    <div className="bg-slate-900 p-4 flex justify-between items-center text-white">
                                        <div className="flex items-center gap-2">
                                            <Icon name="sparkles" className="text-blue-400" />
                                            <span className="font-bold">✨ Smart AI Maintenance Insights</span>
                                        </div>
                                        <button onClick={() => setShowAiModal(false)} className="hover:bg-white/20 p-1 rounded-full"><Icon name="x" /></button>
                                    </div>
                                    <div className="p-6">
                                        {isAnalyzing ? (
                                            <div className="flex flex-col items-center gap-4 py-8">
                                                <div className="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                                                <p className="text-sm font-medium text-slate-500 animate-pulse">차트 데이터를 바탕으로 정밀 분석 중...</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm leading-relaxed text-slate-700">
                                                    {aiAnalysis}
                                                </div>
                                                <p className="text-[10px] text-slate-400 text-center uppercase tracking-tighter">*이 분석은 참고용이며, 최종 정비 판단은 공식 AMM 및 기종 정비사의 지침을 따르십시오.</p>
                                                <button onClick={() => setShowAiModal(false)} className="w-full py-2.5 bg-slate-800 text-white rounded-lg font-bold text-sm hover:bg-slate-900 transition-all">확인</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const EditableInputCard = ({ label, value, unit, color, onCommit, min, max, step, tooltip }) => {
            const [draft, setDraft] = React.useState(String(value));
            const [showTip, setShowTip] = React.useState(false);
            const focused = React.useRef(false);
            React.useEffect(() => { if (!focused.current) setDraft(String(value)); }, [value]);
            const commit = () => { const n = parseFloat(draft); if (!isNaN(n)) onCommit(n); };
            return (
                <div className={`bg-slate-50 rounded border-l-4 ${color} px-3 py-1 flex justify-between items-center h-7 shadow-sm`}>
                    <div className="flex items-center gap-1 min-w-0">
                        <span className="text-[9px] font-bold text-slate-400 uppercase truncate">{label}</span>
                        {tooltip && (
                            <span
                                onMouseEnter={() => setShowTip(true)}
                                onMouseLeave={() => setShowTip(false)}
                                onClick={() => setShowTip(v => !v)}
                                className="relative text-amber-500 cursor-help shrink-0 flex items-center"
                            >
                                <Icon name="info" size={11} />
                                {showTip && (
                                    <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 z-50 w-60 p-2.5 bg-slate-900 text-white text-[10px] font-medium leading-relaxed rounded-lg shadow-xl border border-slate-700 normal-case tracking-normal pointer-events-none whitespace-normal">
                                        {tooltip}
                                        <div className="absolute left-1/2 -translate-x-1/2 top-full w-0 h-0 border-l-[5px] border-r-[5px] border-t-[5px] border-l-transparent border-r-transparent border-t-slate-900"></div>
                                    </div>
                                )}
                            </span>
                        )}
                    </div>
                    <div className="flex items-baseline gap-0.5">
                        <input type="number" value={draft} min={min} max={max} step={step}
                            onChange={e => setDraft(e.target.value)}
                            onFocus={() => { focused.current = true; }}
                            onBlur={() => { focused.current = false; commit(); }}
                            onKeyDown={e => e.key === 'Enter' && commit()}
                            className="text-sm font-black text-slate-700 bg-transparent w-16 text-right outline-none border-b-2 border-transparent focus:border-blue-400 transition-colors" />
                        <span className="text-[8px] font-bold text-slate-300">{unit}</span>
                    </div>
                </div>
            );
        };

        const InputCard = ({ label, value, unit, color }) => (
            <div className={`bg-slate-50 rounded border-l-4 ${color} px-3 py-1 flex justify-between items-center h-7 shadow-sm`}>
                <span className="text-[9px] font-bold text-slate-400 uppercase truncate">{label}</span>
                <div className="flex items-baseline gap-0.5"><span className="text-sm font-black text-slate-700">{value}</span><span className="text-[8px] font-bold text-slate-300">{unit}</span></div>
            </div>
        );

        const ComparisonRow = ({ label, actual, max, margin, unit, onChangeActual }) => {
            const [draft, setDraft] = React.useState(String(actual));
            const focused = React.useRef(false);
            React.useEffect(() => { if (!focused.current) setDraft(String(actual)); }, [actual]);
            const commit = () => { const n = parseFloat(draft); if (!isNaN(n) && onChangeActual) onChangeActual(n); };
            return (
                <div className="grid grid-cols-12 gap-1 items-center bg-slate-50/50 p-1 rounded-lg border border-slate-100 h-9">
                    <div className="col-span-1 flex items-center justify-center font-black text-slate-400 text-[10px]">{label}</div>
                    <div className="col-span-4 bg-white rounded border border-slate-200 px-1.5 py-0.5 flex flex-col justify-center shadow-sm">
                        <label className="text-[7px] font-bold text-slate-400 uppercase leading-none">측정값</label>
                        <div className="flex items-center h-4">
                            <input type="number" value={draft}
                                onChange={e => setDraft(e.target.value)}
                                onFocus={() => { focused.current = true; }}
                                onBlur={() => { focused.current = false; commit(); }}
                                onKeyDown={e => e.key === 'Enter' && commit()}
                                className="text-xs font-black text-slate-700 bg-transparent w-full outline-none border-b border-transparent focus:border-blue-400 transition-colors" />
                            <span className="text-[8px] font-bold text-slate-300 shrink-0">{unit}</span>
                        </div>
                    </div>
                    <div className="col-span-4 bg-emerald-50/20 rounded border border-emerald-100 px-1.5 py-0.5 flex flex-col justify-center shadow-sm">
                        <label className="text-[7px] font-bold text-slate-400 uppercase leading-none">허용치</label>
                        <div className="flex items-center h-4 text-xs font-black text-emerald-600">{max}<span className="text-[8px] font-bold text-slate-300 ml-1">{unit}</span></div>
                    </div>
                    <div className={`col-span-3 rounded flex flex-col items-center justify-center h-full ${margin >= 0 ? 'bg-emerald-500' : 'bg-red-500'} text-white shadow-inner`}>
                        <span className="text-[7px] font-black leading-none opacity-80 uppercase tracking-tighter">Margin</span>
                        <span className="text-xs font-black">{margin >= 0 ? `+${margin}` : margin}</span>
                    </div>
                </div>
            );
        };

        // ======================= ROOT (모드 전환) =======================
        const Root = () => {
            const [mode, setMode] = useState('cg');
            return mode === 'cg'
                ? <CGApp onSwitchMode={() => setMode('pa')} />
                : <PAApp onSwitchMode={() => setMode('cg')} />;
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<Root />);
    </script>
